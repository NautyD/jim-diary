  :root {

    --muted: #999;
    --link: #555;
    --hover: #111;
    --star: #b8935a;
    --card-bg: #fafaf8;
    --card-border: #e8e4dd;
  }
  .dark {
    --bg: #1a1a1a;
    --text: #ccc;
    --muted: #666;
    --link: #888;
    --hover: #ddd;
    --star: #c9a96e;
    --card-bg: #222;

  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {

  a { color: var(--link); text-decoration: none; }

  .site-title {
    font-size: 24px; font-weight: 600; color: var(--text);
    letter-spacing: 6px; margin-bottom: 14px;
  }
  .site-slogan { font-size: 13px; color: var(--muted); line-height: 1.7; max-width: 480px; margin: 0 auto 24px; }
  .theme-toggle {
    font-size: 12px; color: var(--muted); cursor: pointer;
    background: none; border: none; font-family: inherit;
    padding: 6px 14px; border-radius: 14px;
    border: 1px solid var(--card-border);
    transition: all .2s;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--muted); }

  /* ====== Tab 导航 ====== */
  .tab-nav {
    display: flex; justify-content: center; gap: 0;
    border-bottom: 1px solid var(--card-border);
    margin-bottom: 48px; padding-bottom: 0;
  }
  .tab-btn {
    font-size: 13px; color: var(--muted); cursor: pointer;
    background: none; border: none; font-family: inherit;
    padding: 10px 18px; border-bottom: 2px solid transparent;
    transition: all .2s; letter-spacing: 1px;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--star); font-weight: 500; }

  /* ====== Tab 内容区 ====== */
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ====== 日记条目 ====== */
  .entry { margin-bottom: 64px; }
  .entry-folded { margin-bottom: 28px; }
  .entry-date { font-size: 13px; color: var(--muted); margin-bottom: 20px; display: block; }
  .fold-trigger { cursor: pointer; user-select: none; }
  .fold-trigger:hover { color: var(--text); }
  .entry-excerpt { font-size: 15px; color: var(--muted); line-height: 1.7; }
  .entry-body p { margin-bottom: 1.2em; }

  /* ====== 占位面板 ====== */
  .placeholder-panel { text-align: center; padding: 80px 20px; }
  .placeholder-icon { font-size: 36px; color: var(--star); margin-bottom: 20px; }

  .placeholder-tags { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; max-width: 420px; margin: 0 auto; }
  .placeholder-tag {
    font-size: 11px; color: var(--muted); background: var(--card-bg);

  /* ====== 英语板块 ====== */
  .en-subtabs { display: flex; gap: 0; margin-bottom: 28px; border-bottom: 1px solid var(--card-border); }
  .en-subtab {
    font-size: 12px; color: var(--muted); cursor: pointer;
    background: none; border: none; font-family: inherit;
    padding: 8px 14px; border-bottom: 2px solid transparent;
    transition: all .2s; letter-spacing: 1px;
  }
  .en-subtab:hover { color: var(--text); }
  .en-subtab.active { color: var(--text); border-bottom-color: var(--star); }
  .en-subpage { display: none; }
  .en-subpage.active { display: block; }

  .en-date-block { margin-bottom: 40px; }
  .en-date-label { font-size: 13px; color: var(--muted); margin-bottom: 16px; display: block; }
  .en-word-card {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 18px 20px; margin-bottom: 10px;
    transition: border-color .2s;
  }
  .en-word-card:hover { border-color: var(--muted); }
  .en-word-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
  .en-word-text { font-size: 20px; font-weight: 600; color: var(--text); cursor: pointer; }
  .en-word-text:hover { color: var(--star); }
  .en-word-phonetic { font-size: 13px; color: var(--muted); }
  .en-word-pos { font-size: 11px; color: var(--star); border: 1px solid var(--card-border); padding: 1px 8px; border-radius: 8px; margin-left: auto; }
  .en-word-meaning { font-size: 14px; color: var(--text); margin-bottom: 8px; line-height: 1.6; }
  .en-word-example-en { font-size: 12px; color: var(--muted); padding: 6px 10px; background: var(--bg); border-left: 2px solid var(--card-border); border-radius: 0 4px 4px 0; margin-bottom: 2px; line-height: 1.6; }
  .en-word-example-zh { font-size: 12px; color: var(--muted); padding: 0 10px 8px 14px; }
  .en-word-tip { font-size: 11px; color: var(--star); padding: 6px 10px; margin-top: 6px; background: var(--bg); border-radius: 4px; }
  .en-btn-row { display: flex; gap: 6px; margin-top: 8px; }
  .en-btn {
    flex: 1; padding: 6px 0; border: 1px solid var(--card-border); border-radius: 6px;
    font-size: 12px; cursor: pointer; background: var(--bg); color: var(--muted);
    font-family: inherit; transition: all .15s;
  }
  .en-btn:hover { color: var(--text); border-color: var(--muted); }
  .en-btn.mastered { color: var(--star); border-color: var(--star); }

  .en-fold-block { margin-bottom: 10px; }
  .en-fold-trigger { font-size: 12px; color: var(--muted); cursor: pointer; display: block; padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 6px; transition: .2s; }
  .en-fold-trigger:hover { color: var(--text); }
  .en-fold-body { display: none; margin-top: 0; }

  /* 复习/听力/拼写 */
  .en-review-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 16px 18px; margin-bottom: 10px; }
  .en-review-badge { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 8px; margin-bottom: 6px; }
  .en-badge-due { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .en-badge-upcoming { background: var(--card-bg); color: var(--muted); border: 1px solid var(--card-border); }
  .en-badge-done { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .dark .en-badge-due { background: #3b1a1a; color: #fca5a5; border-color: #7f1d1d; }
  .dark .en-badge-done { background: #1a3b1a; color: #86efac; border-color: #166534; }

  .en-listen-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 18px; margin-bottom: 10px; display: flex; align-items: center; gap: 14px; }
  .en-listen-icon { width: 44px; height: 44px; border: 1px solid var(--card-border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: .2s; }
  .en-listen-icon:hover { border-color: var(--star); color: var(--star); }

  .en-quiz-box { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 24px; }
  .en-quiz-progress { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .en-quiz-bar { height: 4px; background: var(--card-border); border-radius: 2px; margin-bottom: 16px; overflow: hidden; }
  .en-quiz-fill { height: 100%; background: var(--star); border-radius: 2px; transition: width .3s; }
  .en-quiz-word { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .en-quiz-hint { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .en-quiz-input { width: 100%; padding: 12px 14px; border: 2px solid var(--card-border); border-radius: 8px; font-size: 16px; background: var(--bg); color: var(--text); outline: none; font-family: inherit; letter-spacing: 1px; transition: border-color .2s; }
  .en-quiz-input:focus { border-color: var(--star); }
  .en-quiz-input.correct { border-color: #16a34a; }
  .en-quiz-input.wrong { border-color: #dc2626; }
  .en-quiz-result { margin-top: 8px; font-size: 13px; min-height: 20px; }
  .en-quiz-btns { display: flex; gap: 8px; margin-top: 14px; }
  .en-quiz-btn { flex: 1; padding: 10px; border: 1px solid var(--card-border); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; background: var(--bg); color: var(--text); transition: .2s; }
  .en-quiz-btn:hover { border-color: var(--muted); }
  .en-quiz-btn.primary { background: var(--star); color: #fff; border-color: var(--star); }
  .en-quiz-btn.primary:hover { opacity: .9; }

  /* 回顶部 */
  .back-to-top {
    position: fixed; bottom: 32px; right: 32px;
    width: 40px; height: 40px; border-radius: 20px;
    background: var(--bg); color: var(--muted);
    border: 1px solid var(--muted); cursor: pointer;
    font-size: 18px; line-height: 38px; text-align: center;
    opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s;
    z-index: 99;
  }
  .back-to-top.visible { opacity: 1; visibility: visible; }
  .back-to-top:hover { color: var(--text); border-color: var(--text); }

  @media (max-width: 600px) {
    .wrap { padding: 40px 16px 96px; }
    .site-title { font-size: 20px; letter-spacing: 4px; }
    .tab-btn { font-size: 12px; padding: 8px 11px; letter-spacing: 0; }
    .entry { margin-bottom: 48px; }
    .en-word-header { flex-wrap: wrap; }
    .back-to-top { bottom: 20px; right: 16px; width: 36px; height: 36px; line-height: 34px; font-size: 16px; }
  }
</style>

<script>
/* ================================================================
   日记系统
   ================================================================ */
var entries = [];
function addEntry(date, body, label) { entries.unshift({ date: date, body: body, label: label }); }
var fmt = function(ds) { var d = new Date(ds); return (d.getMonth()+1) + '月' + d.getDate() + '日'; };
function getExcerpt(html, maxLen) {
  var div = document.createElement('div'); div.innerHTML = html;
  var text = (div.textContent || div.innerText || '').replace(/\s+/g, ' ').trim();
  if (text.length <= maxLen) return text;
  return text.slice(0, maxLen).replace(/[，,。.、；;！!？?」』】）\)]$/, '') + '……';
}
function wordCount(html) { var d=document.createElement('div'); d.innerHTML=html; return (d.textContent||d.innerText||'').replace(/\s+/g,'').length; }

function renderDiary() {
  var SHOW_FULL = 3, EXCERPT_LEN = 120, h = '', lastYear = null;
  for (var i = 0; i < entries.length; i++) {
    var e = entries[i], yr = new Date(e.date).getFullYear();
    if (yr !== lastYear) { if (lastYear!==null) h+='<div class="year-divider"><span>'+yr+'</span></div>'; lastYear=yr; }
    var dateText = e.label || fmt(e.date);
    if (i < SHOW_FULL) {
      h += '<article class="entry"><span class="entry-date">'+dateText+'</span><div class="entry-body">'+e.body+'</div></article>';
    } else {
      var excerpt = getExcerpt(e.body, EXCERPT_LEN);
      h += '<article class="entry entry-folded" data-idx="'+i+'"><span class="entry-date fold-trigger">'+dateText+'</span><div class="entry-excerpt">'+excerpt+'</div><div class="entry-body" style="display:none;">'+e.body+'</div></article>';
    }
  }
  var totalWords = 0; for (var k=0;k<entries.length;k++) totalWords+=wordCount(entries[k].body);
  h += '<footer class="page-footer">共 '+entries.length+' 篇日记 · 约 '+(totalWords>=10000?(totalWords/10000).toFixed(1)+'万':totalWords)+' 字</footer>';
  document.getElementById('diary-list').innerHTML = h;
  var triggers = document.querySelectorAll('.fold-trigger');
  for (var j=0;j<triggers.length;j++) { triggers[j].addEventListener('click',function(){ var a=this.parentElement,b=a.querySelector('.entry-body'),x=a.querySelector('.entry-excerpt'); if(b.style.display==='none'){b.style.display='block';if(x)x.style.display='none'}else{b.style.display='none';if(x)x.style.display='block'} }); }
}

addEntry("2026-05-26", '<p>今天把日记博客从头到尾优化了一遍。</p>'+'<p>白天把亚马逊 AI 运营系统捋顺之后，我还有两个问题想解决：最新日记怎么排最上面？日记写多了翻旧内容会不会很痛苦？第二个问题确实得想，日记会越写越多。</p>'+'<p>WorkBuddy 一开始拿之前研究的五个英文博客给方案。我一看不对——我的博客是中文的，应该看中文博客。它立马换方向重新搜，这个反应速度让我挺满意。</p>'+'<p>于是重新搜，从「中文博客琅琊榜」605 个站点里筛出来几个真正值得看的。</p>'+'<p>水八口的博客二十年 1390 篇 151 万字，白底单列没广告，二十年如一日本身就是最好的设计证明。木匣子的排版本科出身，《中文博客的字体选型》那篇文章看得出来是懂行的。静风说是夫妻俩人写了十五年的日记博客，对多内容怎么组织有自己的方案。再加上一开始就在看的福群——短段落、不装、想到哪写到哪。</p>'+'<p>五个中文博客看完，又看了两篇猫笔刀的文章。猫笔刀前身招财大牛猫，三百万粉丝，十三年日更，财经类自媒体顶流。他的写作有十个可以拆解的技法——但最核心的一个不是技巧，是他不是在教，是在陪。十三年每天准时推送，把自己变成了读者睡前习惯的一部分。</p>'+'<p>把研究转化成改动，分两块。排版方面，对照 typo.css 和各平台字体兼容指南改了行距字重颜色字体栈。结构方面，最新三条全文、其余 120 字摘要点开看、年份分隔符、页脚统计、回顶部按钮。</p>'+'<p>SEO 也顺手配了。标题改成「跨境碎碎念 · 个人成长日记」，定位跨境电商加 AI 加个人成长。meta description、keywords、og 标签补全，百度统计接上。robots.txt 允许所有爬虫。</p>'+'<p>结果 GitHub Pages 部署卡了。</p>'+'<p>线上一直显示旧标题，push 了四五次不变。查了半天，根因是仓库缺 .nojekyll 文件，GitHub Pages 默认走 Jekyll 构建，没有 .nojekyll 不让跳过，构建失败 deploy 就不执行。加了一行 touch .nojekyll 就通了。有时候问题就是这样，答案小得让你觉得之前的折腾很蠢。</p>'+'<p>还有一件顺手做的——把「记一下」的交互优化了。之前每次说「记一下」WorkBuddy 会回复一堆确认信息，很烦。现在是独立对话框，随时丢内容进去，只回一个 # 号，不分析不追问。晚上 21:00 自动化统一提炼。</p>'+'<p>系统文档也固化了。写了 SYSTEM.md 记录完整的技术架构，写了 CHANGELOG.md 做版本记录。打上 v1.0.0 的标记。</p>'+'<p>做这些文件的时候其实有个想法——这些资产全是纯文本，不依赖任何平台或 AI 工具。换电脑换平台数据永远在。这个想法让我很安心。</p>'+'<p>今天做的所有事情，回头看有一个共同的线索：让工作可以被系统接管。</p>'+'<p>以前做亚马逊运营要靠脑子记竞品分析结果、靠感觉写 Listing、靠聊天记录翻上次的广告数据。现在四个 Prompt 系统接力跑，每一环自动留档案，下一环自动读取。</p>'+'<p>以前写日记要手敲排版，格式固定改不了。现在 HTML 极简博客自动部署，只管写不管排版。</p>'+'<p>以前脑子里冒出来的想法转瞬即逝。现在随时丢到「记一下」，晚上自动汇总提炼。</p>'+'<p>这些事加起来，不是一个具体的功能改善。是把散落的工作经验、临时想法、重复操作，慢慢沉淀成可以复用的系统。</p>'+'<p>今天的事大概就这些了。</p>', '让工作被系统接管');

addEntry("2026-05-26", '<p>今天用了多款 AI 工具，完成了配置和知识梳理。记录几个有价值的发现。</p>'+'<p>响应排版有了清晰的认知：<code>#333</code>（柔和深灰）配合 1.8 行高与 1.2em 相对段落间距，构成现代前端排版的标准方案。不是凭感觉拍的数字，是五个顶级博客、typo.css、各平台字体兼容指南交叉验证出来的。</p>'+'<p>AI 飞轮架构是另一个重要认知。亚马逊运营系统通过 <code>/az-</code> 系列指令集实现流程资产化。核心不是"让 AI 帮我做运营"，而是"数据回填闭环"——每一轮输出自动更新产品认知档案，下一轮输入直接读取。</p>'+'<p>Agent 产出方面，成功生成了《新品上架操作指南》，把新品上架规范化成"输入资料 → 指令触发 → 系统自动合规/填充"的四步流程。这是固定资产——下次直接用。</p>'+'<p>多智能体系统在长链路中容易出问题：通信过载、卡死、过度工程化。经验是：日常咨询用轻量 Chat 追求速度，重构资产用强 Agent 追求深度。</p>'+'<p>睡前关键词：<code>/az-</code> 指令集资产化 · 回填数据飞轮 · 避免过度工程化。</p>', '5月26日 · 深度思考');

addEntry("2026-05-26", '<p>今天下午做了一件事：把日记博客从头到尾优化了一遍。</p>'+'<p><a href="https://shuiba.co">水八口</a>的博客写了二十年，1390篇，151万字。日式私博客风格，白底、单列、没有侧边栏没有广告。<a href="https://blog.mutoo.im">木匣子</a>的博客是教科书级的中文极简。<a href="https://www.jfsay.com">静风说</a>夫妻俩写了十五年日记博客。</p>'+'<p>看完中文博客之后，又看猫笔刀的文章。三百万粉丝，十三年日更。最核心的：他不是在教，是在陪。每晚准时推送，把自己变成了读者睡前习惯的一部分。他的排版反常规——不加粗、不引用、不列表、不插图。纯文字流，靠段落节奏控制阅读速度。</p>'+'<p>把研究转化成博客改动。排版对照 typo.css 改了行距字重颜色字体栈。结构方面，最新三条全文、其余120字摘要点击展开、年份分隔符、页脚统计、回顶部按钮。</p>'+'<p>核心收获其实是一句话：好东西都是研究出来的。不是闷头闭门造车，是去看别人怎么做，看懂为什么，然后迁移到自己的场景里。</p>', '5月26日 · 建站手记');

addEntry("2026-05-26", '<p>今天最重要的一件事：亚马逊 AI 运营系统，落地了。</p>'+'<p>不是概念，不是草图，是四个完整的 Prompt 系统。从产品研究到 Listing 生成，从广告增长到复盘诊断——新品从零到稳定运营的完整闭环。</p>'+'<p>四个系统各有定位。系统1是老板+市场分析师：该不该做？怎么赢？系统2是高转化文案专家：让用户更容易下单。系统3是PPC流量专家：建立可持续盈利增长。系统4是复盘专家：不汇总数据，直接找原因，直接给动作。</p>'+'<p>几个设计原则：每个系统只输出 TOP3 优先动作——超过三个等于没有优先级。系统1的预立项判断是铁门，八项红线任何一项触发必须先标注风险。合规铁律写死在每个系统里。</p>'+'<p>把这些东西整理成一个系统花了不少时间。难的不是技术——是把运营经验转成可复用的判断逻辑。把经验写成 Prompt，有点像把直觉写成代码。但做完了回头看，觉得值。</p>', '第一个AI运营系统落地了');

addEntry("2026-05-25", '<p>今天主要是在吸收和整理。</p>'+'<p>亚马逊这块，搞清楚 2026 年的算法逻辑——平台看重的是用户意图匹配和多模态视觉识别。listing 要真正解决用户的问题，图片要能说明白产品，而不是靠关键词密度硬怼。</p>'+'<p>AI 工具总算理清了：CodeBuddy 管编程开发，WorkBuddy 管桌面办公，OpenAI Codex 能做定时自动化。ComfyUI 节点式工作流比一键出图灵活太多，适合批量做素材。</p>'+'<p>在 WorkBuddy 上跑了 Q3 产品 OKR、AI 周报竞品分析、CodeBuddy 年终总结 PPT、亚马逊内容策略方案、AI Agent 行业趋势 PPT。输出风格切换和 PPT 生成确实省了不少手动排版的功夫。</p>', '5月25日 · 信息加载日');

addEntry("2026-05-25", '<p>把这个日记本搬到了互联网上。</p>'+'<p>Notion 的排版不行——没有字重、没有间距控制、字体换不了。然后看了福群的博客，白底黑字，想写什么就写什么。</p>'+'<p>搜了五个公认设计最好的个人博客来研究：Derek Sivers 没有导航栏，Paul Graham 用 &lt;table&gt; 布局，Anthony Fu 现代极简有暗色模式，Gwern 链接悬浮预览，61.life 域名就是设计宣言。</p>'+'<p>七个设计选择五个博客全中：白底黑字、单列布局、无侧边栏、无弹窗广告、系统字体、无阅读量评论数、短段落多留白。这不是巧合，是被验证过的答案。</p>'+'<p>部署到 GitHub Pages：<a href="https://nautyd.github.io/jim-diary/">nautyd.github.io/jim-diary</a>。从想做到真的有一个博客，大概两个小时。</p>', '5月25日 · 建站手记');

function pickVoice(){ for(var i=0;i<_synthVoices.length;i++){var n=_synthVoices[i].name,l=_synthVoices[i].lang;if(l.startsWith('en-US')&&n.indexOf('Samantha')!==-1)return _synthVoices[i];} for(var i=0;i<_synthVoices.length;i++){if(_synthVoices[i].lang.startsWith('en-US'))return _synthVoices[i];} return null; }
function speakSentence(sent){

  var div=document.createElement('div');div.innerHTML=sent;var clean=div.textContent||div.innerText||'';

  var u=new SpeechSynthesisUtterance(clean);u.lang='en-US';u.rate=0.85;u.pitch=1;u.volume=1;
  var v=pickVoice();if(v)u.voice=v;
  setTimeout(function(){window.speechSynthesis.speak(u);},80);
}

function stripHtml(s){var d=document.createElement('div');d.innerHTML=s;return d.textContent||d.innerText||'';}

// 学习页
function renderLearn(){
  var dates=groupWordsByDate(ALL_WORDS), SHOW_FULL=3, h='';
  for(var i=0;i<dates.length;i++){
    var g=dates[i], dLabel=g.date.split('-'), label=Number(dLabel[1])+'月'+Number(dLabel[2])+'日 · 每日单词';
    if(i<SHOW_FULL){ h+='<div class="en-date-block"><span class="en-date-label">'+label+'（'+g.words.length+' 词）</span>'; for(var j=0;j<g.words.length;j++) h+=renderWordCard(g.words[j],i*100+j); h+='</div>'; }
    else { var ws=g.words.map(function(w){return w.word;}).join(' · '); h+='<div class="en-fold-block"><span class="en-fold-trigger" data-idx="'+i+'">'+label+' — '+ws+'</span><div class="en-fold-body" id="enfold-'+i+'"></div></div>'; }
  }
  document.getElementById('esub-learn').innerHTML=h;
  for(var d=0;d<dates.length;d++){if(d>=SHOW_FULL){document.getElementById('enfold-'+d).innerHTML=(function(g){var r='';for(var j=0;j<g.words.length;j++)r+=renderWordCard(g.words[j],1000+j);return r;})(dates[d]);}}
  var trs=document.querySelectorAll('.en-fold-trigger'); for(var t=0;t<trs.length;t++){ trs[t].addEventListener('click',function(){var b=document.getElementById('enfold-'+this.dataset.idx);b.style.display=b.style.display==='block'?'none':'block';}); }
  // 标记掌握按钮
  var btns=document.querySelectorAll('.en-btn-mastered'); for(var b=0;b<btns.length;b++){ var w=btns[b].dataset.word; if(masteredSet[w]){btns[b].textContent='✓ 已掌握';btns[b].classList.add('mastered');} }
}

function renderWordCard(w,idx){
  return '<div class="en-word-card">'
    +'<div class="en-word-header">'
    +'<span class="en-word-text" onclick="speakWord(\''+w.word+'\')">'+w.word+'</span>'
    +'<span class="en-word-phonetic">'+w.phonetic+'</span>'
    +'<span class="en-word-pos">'+w.pos+'</span></div>'
    +'<div class="en-word-meaning">'+w.meaning+'</div>'
    +'<div class="en-word-example-en">'+w.example_en+'</div>'
    +'<div class="en-word-example-zh">'+w.example_zh+'</div>'
    +'<div class="en-word-tip">💡 '+w.tip+'</div>'
    +'<div class="en-btn-row">'
    +'<button class="en-btn" onclick="speakWord(\''+w.word+'\')">🔊 发音</button>'
    +'<button class="en-btn" onclick="speakSentence(\''+w.example_en.replace(/'/g,"\\'")+'\')">📖 例句</button>'
    +'<button class="en-btn en-btn-mastered" data-word="'+w.word+'" onclick="toggleMastered(\''+w.word+'\',this)">☆ 掌握</button>'
    +'</div></div>';
}

function toggleMastered(word,btn){
  if(masteredSet[word]){ delete masteredSet[word]; btn.textContent='☆ 掌握'; btn.classList.remove('mastered'); }
  else { masteredSet[word]=true; btn.textContent='✓ 已掌握'; btn.classList.add('mastered'); }
  localStorage.setItem('en_mastered',JSON.stringify(masteredSet));
}

// 复习页
function getReviewStatus(word){ try{return JSON.parse(localStorage.getItem('eb_'+word)||'[]');}catch(e){return[];} }
function renderReview(){
  var c=document.getElementById('esub-review'), h='<div style="font-size:13px;color:var(--muted);margin-bottom:16px;">🧠 艾宾浩斯复习 · 学习当天→第1天→第2天→第4天→第7天→第15天</div>';
  var due=[], upcoming=[], done=[];
  for(var i=0;i<ALL_WORDS.length;i++){
    var w=ALL_WORDS[i], records=getReviewStatus(w.word), reviewedRounds=0;
    for(var r=0;r<records.length;r++){if(records[r].result==='yes')reviewedRounds++;}
    var learned=new Date(w.date+'T00:00:00'), today=new Date(TODAY+'T00:00:00'), dayDiff=Math.floor((today-learned)/(1000*60*60*24));
    var nextRound=reviewedRounds, targetDay=EB_INTERVALS[nextRound]||999;
    var isDue=nextRound<EB_INTERVALS.length&&dayDiff>=targetDay, allDone=nextRound>=EB_INTERVALS.length;
    if(dayDiff>=0){ var item={w:w,round:nextRound+1,reviewedRounds:reviewedRounds,dayDiff:dayDiff}; if(isDue&&!allDone)due.push(item); else if(allDone)done.push(item); else upcoming.push(item); }
  }
  if(due.length>0){ h+='<div style="font-size:12px;color:#dc2626;margin:12px 0 8px;">⚠️ 今日需复习（'+due.length+' 个）</div>'; for(var d=0;d<due.length;d++) h+=renderReviewCard(due[d],true); }
  if(upcoming.length>0){ h+='<div style="font-size:12px;color:var(--muted);margin:12px 0 8px;">📅 待复习（'+upcoming.length+' 个）</div>'; for(var u=0;u<upcoming.length;u++) h+=renderReviewCard(upcoming[u],false); }
  if(done.length>0){ h+='<div style="font-size:12px;color:#16a34a;margin:12px 0 8px;">✅ 已完成全部复习（'+done.length+' 个）</div>'; for(var n=0;n<done.length;n++) h+=renderReviewCard(done[n],false,true); }
  if(due.length+upcoming.length+done.length===0) h+='<div style="text-align:center;padding:40px;color:var(--muted);">还没有需要复习的单词</div>';
  c.innerHTML=h;
}
function renderReviewCard(item,isDue,allDone){
  var w=item.w, badge='', actions='';
  if(allDone) badge='<span class="en-review-badge en-badge-done">✅ 全部完成</span>';
  else if(isDue) { badge='<span class="en-review-badge en-badge-due">⚠️ 第'+item.round+'/5轮 · 今天复习</span>'; actions='<div style="margin-top:8px;"><button class="en-btn" onclick="markReviewed(\''+w.word+'\','+item.round+')" style="color:#16a34a;border-color:#16a34a;">✅ 已复习</button></div>'; }
  else badge='<span class="en-review-badge en-badge-upcoming">📅 第'+item.round+'/5轮 · 已完成'+item.reviewedRounds+'/5轮</span>';
  return '<div class="en-review-card">'+badge+'<div style="font-size:16px;font-weight:600;margin:4px 0;">'+w.word+' <span style="font-size:12px;color:var(--muted);font-weight:400;">'+w.phonetic+'</span></div><div style="font-size:13px;color:var(--text);">'+w.meaning+'</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">'+stripHtml(w.example_en)+'</div>'+actions+'</div>';
}
function markReviewed(word,round){
  var key='eb_'+word, records=[]; try{records=JSON.parse(localStorage.getItem(key)||'[]');}catch(e){}
  records.push({date:TODAY,round:round,result:'yes'}); localStorage.setItem(key,JSON.stringify(records)); renderReview();
}

// 听力页
var listenIdx=0;
function renderListen(){
  var c=document.getElementById('esub-listen'); if(ALL_WORDS.length===0){c.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted);">暂无单词</div>';return;}
  var w=ALL_WORDS[listenIdx];
  var others=[]; for(var i=0;i<ALL_WORDS.length;i++){if(ALL_WORDS[i].word!==w.word)others.push(ALL_WORDS[i]);}
  for(var i=others.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=others[i];others[i]=others[j];others[j]=t;}
  var choices=[]; for(var i=0;i<3&&i<others.length;i++)choices.push(others[i].word); choices.push(w.word);
  for(var i=choices.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=choices[i];choices[i]=choices[j];choices[j]=t;}
  var optHtml=''; for(var o=0;o<choices.length;o++) optHtml+='<button onclick="checkListen(\''+choices[o]+'\',\''+w.word+'\',this)" style="padding:10px;border:1px solid var(--card-border);border-radius:6px;background:var(--bg);color:var(--text);font-size:14px;cursor:pointer;font-family:inherit;">'+choices[o]+'</button>';
  c.innerHTML='<div style="font-size:12px;color:var(--muted);margin-bottom:14px;">单词 '+(listenIdx+1)+' / '+ALL_WORDS.length+'</div>'
    +'<div class="en-listen-card"><div class="en-listen-icon" onclick="speakWord(\''+w.word+'\')">🔊</div><div><div style="font-size:18px;font-weight:600;">'+w.word+'</div><div style="font-size:12px;color:var(--muted);">'+w.phonetic+'</div><div style="font-size:13px;color:var(--muted);margin-top:4px;">'+w.meaning+'</div></div></div>'
    +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;" id="listen-opts">'+optHtml+'</div>'
    +'<div style="display:flex;gap:8px;"><button class="en-btn" onclick="listenPrev()">← 上一个</button><button class="en-btn" onclick="listenNext()" style="border-color:var(--star);color:var(--star);">下一个 →</button></div>';
  speakWord(w.word);
}
function checkListen(sel,cor,btn){
  var btns=document.querySelectorAll('#listen-opts button'); for(var i=0;i<btns.length;i++){btns[i].disabled=true;btns[i].style.opacity='0.6';}
  if(sel===cor){btn.style.borderColor='#16a34a';btn.style.color='#16a34a';} else {btn.style.borderColor='#dc2626';btn.style.color='#dc2626';for(var i=0;i<btns.length;i++){if(btns[i].textContent.trim()===cor){btns[i].style.borderColor='#16a34a';btns[i].style.color='#16a34a';}}} speakWord(cor);
}
function listenNext(){listenIdx=(listenIdx+1)%ALL_WORDS.length;renderListen();}
function listenPrev(){listenIdx=(listenIdx-1+ALL_WORDS.length)%ALL_WORDS.length;renderListen();}

// 拼写页
var quizWords=[], quizIdx=0, quizScore=0;
function startQuiz(){
  var shuffled=ALL_WORDS.slice(0); for(var i=shuffled.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=shuffled[i];shuffled[i]=shuffled[j];shuffled[j]=t;}
  quizWords=shuffled.slice(0,Math.min(5,shuffled.length)); quizIdx=0; quizScore=0;
  var box=document.getElementById('quiz-box');
  box.innerHTML='<div class="en-quiz-progress" id="qz-progress">第 1 / '+quizWords.length+' 题</div><div class="en-quiz-bar"><div class="en-quiz-fill" id="qz-fill"></div></div><div class="en-quiz-word" id="qz-word"></div><div class="en-quiz-hint" id="qz-hint"></div><input class="en-quiz-input" id="qz-input" type="text" placeholder="输入英文单词..." autocomplete="off" autocapitalize="off" spellcheck="false"><div class="en-quiz-result" id="qz-result"></div><div class="en-quiz-btns"><button class="en-quiz-btn" onclick="showHint()">💡 提示</button><button class="en-quiz-btn primary" onclick="checkAnswer()">✅ 检查</button><button class="en-quiz-btn" onclick="nextQuiz()" style="display:none" id="btn-nq">下一题 →</button></div><div class="en-quiz-result" id="qz-score"></div>';
  renderQuizQ();
}
function renderQuizQ(){
  if(quizIdx>=quizWords.length){ var pct=Math.round(quizScore/quizWords.length*100); document.getElementById('quiz-box').innerHTML='<div style="text-align:center;padding:30px;"><div style="font-size:36px;margin-bottom:12px;">'+(pct===100?'🏆':'💪')+'</div><div style="font-size:18px;font-weight:600;margin-bottom:8px;">得分：'+quizScore+' / '+quizWords.length+'（'+pct+'%）</div><button class="en-quiz-btn primary" onclick="startQuiz()">🔄 再来一轮</button></div>'; return; }
  var w=quizWords[quizIdx];
  document.getElementById('qz-progress').textContent='第 '+(quizIdx+1)+' / '+quizWords.length+' 题';
  document.getElementById('qz-fill').style.width=(quizIdx/quizWords.length*100)+'%';
  document.getElementById('qz-word').textContent='？？？';
  document.getElementById('qz-hint').innerHTML=w.pos+'  '+w.meaning+'<br><span style="color:var(--muted);">'+w.example_zh+'</span>';
  document.getElementById('qz-input').value=''; document.getElementById('qz-input').className='en-quiz-input'; document.getElementById('qz-input').disabled=false;
  document.getElementById('qz-result').textContent=''; document.getElementById('btn-nq').style.display='none';
  document.querySelector('.en-quiz-btn.primary').style.display=''; document.getElementById('qz-input').focus();
}
function checkAnswer(){
  var w=quizWords[quizIdx], input=document.getElementById('qz-input').value.trim().toLowerCase(), res=document.getElementById('qz-result');
  if(input===w.word.toLowerCase()){ document.getElementById('qz-input').className='en-quiz-input correct'; res.innerHTML='✅ 正确！'+w.word+' — '+w.meaning; res.style.color='#16a34a'; quizScore++; }
  else { document.getElementById('qz-input').className='en-quiz-input wrong'; res.innerHTML='❌ 正确答案：<b>'+w.word+'</b>（'+w.meaning+'）<br>💡 '+w.tip; res.style.color='#dc2626'; }
  document.getElementById('qz-input').disabled=true; document.querySelector('.en-quiz-btn.primary').style.display='none'; document.getElementById('btn-nq').style.display='';
}
function showHint(){var w=quizWords[quizIdx],hint=w.word[0];for(var i=1;i<w.word.length;i++)hint+=' _';document.getElementById('qz-result').innerHTML='💡 '+hint+' ('+w.word.length+'字母)';document.getElementById('qz-result').style.color='var(--star)';}
function nextQuiz(){quizIdx++;renderQuizQ();}

// ====== 英文板块初始化 ======
renderLearn();

/* ================================================================
   Tab 切换系统
   ================================================================ */
function switchTab(tabName){
  var btns=document.querySelectorAll('.tab-btn'); for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var tabs=document.querySelectorAll('.tab-content'); for(var j=0;j<tabs.length;j++)tabs[j].classList.remove('active');
  document.querySelector('.tab-btn[data-tab="'+tabName+'"]').classList.add('active');
  document.getElementById('tab-'+tabName).classList.add('active');
  if(tabName==='english'){ renderLearn(); }
}
var tabBtns=document.querySelectorAll('.tab-btn'); for(var i=0;i<tabBtns.length;i++){ tabBtns[i].addEventListener('click',function(){switchTab(this.dataset.tab);}); }

// 英文子Tab切换
function switchEnSub(sub){
  var btns=document.querySelectorAll('.en-subtab'); for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
  var pages=document.querySelectorAll('.en-subpage'); for(var j=0;j<pages.length;j++)pages[j].classList.remove('active');
  document.querySelector('.en-subtab[data-esub="'+sub+'"]').classList.add('active');
  document.getElementById('esub-'+sub).classList.add('active');
  if(sub==='review')renderReview(); if(sub==='listen')renderListen(); if(sub==='quiz')startQuiz();
}
var enSubBtns=document.querySelectorAll('.en-subtab'); for(var i=0;i<enSubBtns.length;i++){ enSubBtns[i].addEventListener('click',function(){switchEnSub(this.dataset.esub);}); }

// 拼写回车键
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('esub-quiz').classList.contains('active')){var inp=document.getElementById('qz-input');if(inp&&!inp.disabled)checkAnswer();else if(document.getElementById('btn-nq').style.display!=='none')nextQuiz();}});

/* ================================================================
   暗色模式 & 回顶部
   ================================================================ */
(function(){
  var saved=localStorage.getItem('theme'), prefers=window.matchMedia('(prefers-color-scheme: dark)').matches;
  var isDark=saved==='dark'||(!saved&&prefers), btn=document.getElementById('theme-btn');
  if(isDark){document.documentElement.classList.add('dark');btn.textContent='亮';}
  btn.addEventListener('click',function(){if(document.documentElement.classList.contains('dark')){document.documentElement.classList.remove('dark');localStorage.setItem('theme','light');btn.textContent='暗';}else{document.documentElement.classList.add('dark');localStorage.setItem('theme','dark');btn.textContent='亮';}});
})();
(function(){
  var btn=document.getElementById('back-to-top'), ticking=false;
  window.addEventListener('scroll',function(){if(!ticking){requestAnimationFrame(function(){if(window.scrollY>window.innerHeight)btn.classList.add('visible');else btn.classList.remove('visible');ticking=false;});ticking=true;}});
  btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
})();
</script>
